services:
  docstruct:
    build:
      context: .
    image: docstruct:local
    working_dir: /app
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4.1-mini}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2025-01-01-preview}
      DOCSTRUCT_MIN_CONFIDENCE: ${DOCSTRUCT_MIN_CONFIDENCE:-0.75}
      DOCSTRUCT_BATCH_SIZE: ${DOCSTRUCT_BATCH_SIZE:-5}
      DOCSTRUCT_PARALLEL: ${DOCSTRUCT_PARALLEL:-true}
      DOCSTRUCT_MAX_WORKERS: ${DOCSTRUCT_MAX_WORKERS:-4}
      DOCSTRUCT_AGENT_MODEL: ${DOCSTRUCT_AGENT_MODEL:-}
      DOCSTRUCT_AGENT_MAX_TOKENS: ${DOCSTRUCT_AGENT_MAX_TOKENS:-4096}
      DOCSTRUCT_AGENT_TEMPERATURE: ${DOCSTRUCT_AGENT_TEMPERATURE:-0.0}
      DOCSTRUCT_AGENT_TIMEOUT: ${DOCSTRUCT_AGENT_TIMEOUT:-30}
      DOCSTRUCT_AGENT_RETRY_COUNT: ${DOCSTRUCT_AGENT_RETRY_COUNT:-3}
      DOCSTRUCT_AGENT_RETRY_DELAY: ${DOCSTRUCT_AGENT_RETRY_DELAY:-1}
      DOCSTRUCT_AGENT_PROVIDER: ${DOCSTRUCT_AGENT_PROVIDER:-}
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    entrypoint:
      - python
      - -m
      - docstruct
